name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install gulp-cli
        run: npm install -g gulp-cli

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run ship

      - name: Read solution version
        id: version
        run: |
          VERSION=$(node -p "require('./config/package-solution.json').solution.version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Releases
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Latest Build (v${{ steps.version.outputs.version }})"
          body: |
            Automated build from commit ${{ github.sha }}.
            Upload `smart-permissions.sppkg` to your SharePoint App Catalog to deploy.
          artifacts: "sharepoint/solution/smart-permissions.sppkg"
          artifactContentType: application/zip
          allowUpdates: true
          removeArtifacts: true
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
